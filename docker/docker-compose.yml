version: '3.8'

services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: server
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in .env (openssl rand -hex 32)}
      - CORS_ORIGIN=http://localhost:5173
    depends_on:
      - redis
    restart: unless-stopped

  editor:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: editor
    ports:
      - "5173:80"
    depends_on:
      - server
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
